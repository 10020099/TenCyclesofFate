<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮生十梦</title>
    <link rel="stylesheet" href="index.css">
    <!-- Add Marked.js library for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify: sanitize rendered HTML to prevent XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <!-- Add pako for Gzip decompression -->
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <!-- Add fast-json-patch for incremental state updates -->
    <script src="https://cdn.jsdelivr.net/npm/fast-json-patch@3.1.1/dist/fast-json-patch.min.js"></script>
</head>

<body>
    <div id="app-container">
        <!-- Login View -->
        <div id="login-view" class="view active">
            <h1>浮生十梦</h1>
            <p>此乃试炼之地，请先表明身份。</p>
            <div id="login-form">
                <input type="text" id="login-key-input" placeholder="输入你的专属密钥..." autocomplete="off">
                <button class="login-button" id="login-button">踏入轮回</button>
            </div>
            <p id="login-error" class="error-message"></p>
        </div>

        <!-- Game View -->
        <div id="game-view" class="view">
            <header id="game-header">
                <h1>浮生一梦</h1>
                <div id="game-status">
                    <span>剩余机缘: <span id="opportunities">10</span></span>
                    <button id="fullscreen-button" class="header-button" title="全屏模式">⛶</button>
                    <button id="logout-button" class="header-button">登出</button>
                </div>
            </header>

            <aside id="status-panel">
                <!-- Character status will be rendered here -->
                <p>【人物业力】</p>
                <div id="character-status"></div>
                <!-- 修改器按钮（仅在修改器激活时显示） -->
                <button id="modifier-toggle-button" class="modifier-btn hidden">🔧 修改器</button>
            </aside>

            <main id="main-content">
                <div id="narrative-window">
                    <!-- Game narrative will be appended here -->
                </div>
            </main>

            <footer id="action-area">
                <div class="action-input-row">
                    <input type="text" id="action-input" placeholder="汝欲何为..." disabled>
                    <button id="action-button" disabled>定</button>
                </div>
                <button id="start-trial-button" class="hidden">开启下一次试炼</button>
            </footer>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="spinner-overlay" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- Roll Animation Overlay -->
        <div id="roll-overlay" class="hidden">
            <div id="roll-panel">
                <div class="dice-cup">🎲</div>
                <div id="roll-details">
                    <span id="roll-type"></span>
                    <span id="roll-target"></span>
                </div>
                <div id="roll-result-display" class="hidden">
                    <span id="roll-outcome"></span>
                    <span id="roll-value"></span>
                </div>
            </div>
        </div>

        <!-- 修改器面板 -->
        <div id="modifier-panel" class="hidden">
            <div class="modifier-panel-header">
                <h3>🔧 修改器面板</h3>
                <button id="modifier-close" class="modifier-close-btn">×</button>
            </div>
            <div class="modifier-panel-body">
                <div class="modifier-field">
                    <label for="mod-opportunities">剩余机缘</label>
                    <input type="number" id="mod-opportunities" min="0" max="999">
                </div>
                <div class="modifier-field">
                    <label for="mod-in-trial">
                        <input type="checkbox" id="mod-in-trial">
                        当前在试炼中
                    </label>
                </div>
                <div class="modifier-field">
                    <label for="mod-daily-success">
                        <input type="checkbox" id="mod-daily-success">
                        今日已完成
                    </label>
                </div>
                <div class="modifier-field">
                    <label for="mod-punishment">
                        <input type="checkbox" id="mod-punishment">
                        清除待处理惩罚
                    </label>
                </div>
                <div class="modifier-field">
                    <label for="mod-processing">
                        <input type="checkbox" id="mod-processing">
                        清除处理锁定
                    </label>
                </div>
                <div class="modifier-field">
                    <label for="mod-current-life">角色数据 (current_life JSON)</label>
                    <textarea id="mod-current-life" rows="8" placeholder="角色不在试炼中时为空..."></textarea>
                    <small style="color: #999;">编辑角色的灵石、属性等数据。请保持 JSON 格式正确。</small>
                </div>
                <div class="modifier-actions">
                    <button id="modifier-apply" class="modifier-apply-btn">✅ 应用修改</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="index.js"></script>
</body>

</html>
